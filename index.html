<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Forge | 智能部署核心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #06b6d4; 
            --primary-dim: rgba(6, 182, 212, 0.1);
        }

        body {
            background-color: #09090b; 
            background-image: 
                radial-gradient(at 10% 10%, rgba(6, 182, 212, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(79, 70, 229, 0.08) 0px, transparent 50%);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            color: #e4e4e7; 
            margin: 0;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(24, 24, 27, 0.6); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(9, 9, 11, 0.6); 
            border: 1px solid rgba(39, 39, 42, 0.8); 
            color: #fafafa;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            background: rgba(9, 9, 11, 0.9);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-dim);
            outline: none;
        }

        input[type="file"] { display: none; }

        .loading-ring { 
            border: 2px solid rgba(255,255,255,0.1); 
            border-top: 2px solid var(--primary); 
            border-radius: 50%; 
            width: 16px; height: 16px; 
            animation: spin 1s linear infinite; 
            flex-shrink: 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .overflow-y-auto::-webkit-scrollbar { width: 6px; }
        .overflow-y-auto::-webkit-scrollbar-track { background: transparent; }
        .overflow-y-auto::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        .overflow-y-auto::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        #btn-deploy {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        #btn-deploy:hover {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
            transform: translateY(-1px);
        }
        #btn-deploy:active { transform: translateY(1px); }
        #btn-deploy::after {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s;
        }
        #btn-deploy:hover::after { opacity: 1; }
    </style>
<link rel="manifest" href="./manifest.json"><script>navigator.serviceWorker.register('./sw.js')</script></head>
<body class="flex items-center justify-center p-3 md:p-8 min-h-screen">

    <div class="glass-card w-full max-w-6xl rounded-3xl overflow-hidden flex flex-col md:flex-row border border-white/5">
        <div class="p-6 md:p-12 md:w-3/5 border-b md:border-b-0 md:border-r border-zinc-800 overflow-y-auto" style="max-height: 90vh;">
            <header class="mb-8">
                <div class="flex items-center gap-4 mb-3">
                    <div class="w-12 h-12 bg-teal-950 border border-teal-500/30 rounded-2xl flex items-center justify-center shadow-lg shadow-teal-900/50">
                        <i class="ph ph-atom text-teal-400 text-3xl"></i>
                    </div>
                    <h1 class="text-2xl md:text-3xl font-bold tracking-tighter text-fafafa bg-clip-text text-transparent bg-gradient-to-r from-white to-zinc-400">Nexus Forge Pro</h1>
                </div>
                <p class="text-xs text-teal-500 font-bold tracking-widest uppercase opacity-80">防冲突单线序列版 v3</p>
            </header>

            <div class="space-y-6 md:space-y-8">
                <div class="p-5 md:p-6 bg-zinc-900/40 rounded-2xl border border-zinc-800 relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-r from-teal-900/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="relative z-10">
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-sm font-bold text-teal-400 uppercase tracking-widest flex items-center gap-2">
                                <i class="ph ph-keyhole-fill"></i> Step 1. GitHub 鉴权密钥
                            </label>
                        </div>
                        <input type="password" id="gh-token" class="input-field w-full px-5 py-4 rounded-xl text-base font-mono" placeholder="粘贴您的 ghp_ 开头 Token">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                    <div class="space-y-2.5">
                        <label class="text-sm font-semibold text-zinc-400 uppercase tracking-wider">应用名称</label>
                        <input type="text" id="pwa-name" class="input-field w-full px-5 py-4 rounded-xl text-base" placeholder="例如：我的主控台">
                    </div>
                    <div class="space-y-2.5">
                        <label class="text-sm font-semibold text-zinc-400 uppercase tracking-wider">仓库标识</label>
                        <input type="text" id="repo-name" class="input-field w-full px-5 py-4 rounded-xl text-base font-mono text-teal-300" placeholder="app-xxxx">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                    <label for="files-upload" class="flex flex-col items-center justify-center h-40 border-2 border-dashed border-zinc-700 rounded-2xl cursor-pointer hover:bg-zinc-900/50 hover:border-teal-600 transition-all group">
                        <i class="ph ph-files text-4xl text-zinc-600 group-hover:text-teal-400 group-hover:scale-110 transition-transform"></i>
                        <span id="files-status" class="mt-3 text-sm font-medium text-zinc-400 group-hover:text-zinc-200 text-center px-4">
                            点击选择所有项目文件<br>
                            <span class="text-xs opacity-60 font-normal mt-1 block">(防 409 保护已开启)</span>
                        </span>
                        <input type="file" id="files-upload" multiple>
                    </label>

                    <label for="icon-upload" class="flex flex-col items-center justify-center h-40 border-2 border-dashed border-zinc-700 rounded-2xl cursor-pointer hover:bg-zinc-900/50 hover:border-teal-600 transition-all group relative overflow-hidden">
                        <img id="icon-preview" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-300">
                        <div class="relative z-10 flex flex-col items-center p-2 text-center">
                            <i class="ph ph-circles-four text-4xl text-zinc-600 group-hover:text-teal-400 group-hover:scale-110 transition-transform"></i>
                            <span id="icon-status" class="mt-3 text-sm text-zinc-400 group-hover:text-zinc-200">上传应用图标 (可选)</span>
                        </div>
                        <input type="file" id="icon-upload" accept="image/*">
                    </label>
                </div>
            </div>
        </div>

        <div class="p-6 md:p-12 md:w-2/5 flex flex-col justify-between bg-black/20">
            <div class="space-y-8">
                <section>
                    <h3 class="text-sm font-bold text-zinc-200 mb-5 flex items-center gap-2.5 uppercase tracking-widest border-b border-zinc-800 pb-3">
                        <i class="ph ph-broadcast text-teal-400 text-lg"></i> 实时部署内核状态
                    </h3>
                    <div id="log-container" class="space-y-4 font-mono text-xs text-zinc-400">
                        <div class="flex items-center gap-3"><i class="ph ph-power text-zinc-600"></i> Forge 核心准备就绪</div>
                    </div>
                </section>

                <div id="success-link" class="hidden transform translate-y-2 opacity-0 transition-all duration-500">
                    <div class="p-5 rounded-xl bg-teal-950/50 border border-teal-500/30 text-teal-200 shadow-lg shadow-teal-900/30">
                        <p class="text-xs font-bold uppercase mb-2 tracking-widest text-teal-300">部署成功！晶体链接已生成：</p>
                        <a id="final-url" href="#" target="_blank" class="text-sm underline break-all font-mono hover:text-white transition-colors"></a>
                        <p class="text-[11px] text-zinc-400 mt-3">注：GitHub 刷新缓存需 1-2 分钟，若页面未变请耐心等待并强制刷新。</p>
                    </div>
                </div>
            </div>

            <div class="mt-10 md:mt-0">
                <button id="btn-deploy" class="w-full py-5 text-white rounded-xl font-bold tracking-widest transition-all shadow-lg flex items-center justify-center gap-3 group text-sm md:text-base uppercase">
                    <i class="ph ph-rocket-launch text-xl group-hover:animate-pulse"></i> 单线全自动部署
                </button>
            </div>
        </div>
    </div>

    <script>
        const pwaNameInput = document.getElementById('pwa-name');
        const repoNameInput = document.getElementById('repo-name');
        const filesInput = document.getElementById('files-upload');
        const iconInput = document.getElementById('icon-upload');
        const btnDeploy = document.getElementById('btn-deploy');
        const logContainer = document.getElementById('log-container');

        let uploadedFiles = [];
        let uploadedIcon = null;

        pwaNameInput.addEventListener('input', (e) => {
            let val = e.target.value;
            let slug = val.toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]/g, '');
            if (!slug && val.length > 0) slug = 'app-' + Math.random().toString(36).substring(2, 6);
            repoNameInput.value = slug || 'my-nexus-app';
        });

        filesInput.onchange = (e) => { 
            uploadedFiles = Array.from(e.target.files);
            const statusText = document.getElementById('files-status');
            if(uploadedFiles.length > 0) { 
                statusText.innerHTML = `<span class="text-teal-300 font-bold text-lg">已选择 ${uploadedFiles.length} 个文件</span><br><span class="text-xs mt-1 block text-zinc-400">底层已开启安全列队机制</span>`; 
            } else {
                statusText.innerHTML = `点击选择所有项目文件<br><span class="text-xs opacity-60 mt-1 block">(防 409 保护已开启)</span>`;
            }
        };

        iconInput.onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                uploadedIcon = f;
                const preview = document.getElementById('icon-preview');
                preview.src = URL.createObjectURL(f);
                preview.style.opacity = "1";
                document.getElementById('icon-status').style.opacity = "0";
            }
        };

        function addLog(msg, status = 'loading') {
            const icons = { 
                loading: '<div class="loading-ring"></div>', 
                done: '<i class="ph ph-check-circle-fill text-teal-400 text-lg flex-shrink-0"></i>', 
                error: '<i class="ph ph-x-circle-fill text-red-500 text-lg flex-shrink-0"></i>' 
            };
            const div = document.createElement('div');
            div.className = "flex items-start gap-3 transform translate-x-1 opacity-0 transition-all duration-300 leading-tight";
            div.innerHTML = `${icons[status]} <span class="${status === 'error' ? 'text-red-400' : ''} mt-0.5">${msg}</span>`;
            logContainer.appendChild(div);
            logContainer.parentElement.scrollTop = logContainer.parentElement.scrollHeight;
            setTimeout(() => div.classList.remove('translate-x-1', 'opacity-0'), 50);
            return div; 
        }

        const safeBase64Encode = (str) => {
            const bytes = new TextEncoder().encode(str);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        };

        async function processImg(file, size) {
            return new Promise(res => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, img.width, img.height, 0, 0, size, size);
                    res(canvas.toDataURL('image/png').split(',')[1]);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        async function ghFetch(url, token, method = 'GET', body = null) {
            const res = await fetch(`https://api.github.com${url}`, {
                method, headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
                body: body ? JSON.stringify(body) : null
            });
            if(!res.ok) {
                const errText = await res.text();
                const err = new Error(errText);
                err.status = res.status;
                throw err;
            }
            return res.status === 204 ? {} : res.json();
        }

        // 辅助延迟函数，避免请求过快
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function uploadFileWithOverwrite(user, repo, token, path, content) {
            let sha = undefined;
            try {
                // 加强版时间戳防缓存
                const getRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}?t=${new Date().getTime()}`, {
                    headers: { 
                        'Authorization': `Bearer ${token}`, 
                        'Accept': 'application/vnd.github+json',
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache'
                    },
                    cache: 'no-store'
                });
                if (getRes.ok) sha = (await getRes.json()).sha;
            } catch (e) {}

            const body = { message: `Deploy ${path} safely`, content: content };
            if (sha) body.sha = sha; 
            
            await ghFetch(`/repos/${user}/${repo}/contents/${path}`, token, 'PUT', body);
        }

        btnDeploy.onclick = async () => {
            const token = document.getElementById('gh-token').value;
            const repo = repoNameInput.value;
            const name = pwaNameInput.value || "Forge App";
            
            if(!token || !repo || uploadedFiles.length === 0) {
                return alert("请完整填写 Token、应用名称，并至少选择一个文件");
            }

            logContainer.innerHTML = "";
            document.getElementById('success-link').classList.add('hidden', 'translate-y-2', 'opacity-0');
            btnDeploy.disabled = true;
            btnDeploy.innerText = "正在单线锻造...";
            btnDeploy.classList.add('opacity-50');

            try {
                addLog("正在校验鉴权协议...");
                const user = await ghFetch('/user', token);
                
                addLog(`接入成功: ${user.login}，初始化仓库...`);
                try {
                    await ghFetch('/user/repos', token, 'POST', { name: repo, auto_init: true });
                } catch(e) { 
                    if(e.status !== 422) throw e; 
                    addLog("目标仓库已存在，执行安全覆盖模式...", 'loading');
                }

                // 数据去重
                let finalFiles = new Map();

                for(let file of uploadedFiles) {
                    const path = file.webkitRelativePath || file.name;
                    
                    if (path.toLowerCase() === 'index.html') {
                        const text = await new Promise(res => { 
                            const r = new FileReader(); 
                            r.onload = e => res(e.target.result); 
                            r.readAsText(file); 
                        });
                        const finalHtml = text.includes('</head>') 
                            ? text.replace('</head>', `<link rel="manifest" href="./manifest.json"><script>navigator.serviceWorker.register('./sw.js')<\/script></head>`)
                            : text;
                        finalFiles.set(path, safeBase64Encode(finalHtml));
                    } else {
                        const dataUrl = await new Promise(res => { 
                            const r = new FileReader(); 
                            r.onload = e => res(e.target.result); 
                            r.readAsDataURL(file); 
                        });
                        finalFiles.set(path, dataUrl.split(',')[1]);
                    }
                }

                // 生成 PWA 必需文件
                const manifest = JSON.stringify({ name, short_name: name, start_url: "./index.html", display: "standalone", icons: [{src:"icon-192.png", sizes:"192x192", type:"image/png"}] });
                const sw = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));`;
                
                finalFiles.set('manifest.json', safeBase64Encode(manifest));
                finalFiles.set('sw.js', safeBase64Encode(sw));
                if(uploadedIcon) {
                    finalFiles.set('icon-192.png', await processImg(uploadedIcon, 192));
                }

                // 将任务列化
                let uploadTasks = Array.from(finalFiles.entries()).map(([path, content]) => {
                    return () => uploadFileWithOverwrite(user.login, repo, token, path, content);
                });

                let progressLog = addLog(`单线防冲突传输已建立，共 ${uploadTasks.length} 个独立文件...`, 'loading');
                
                // 核心修改：改为极其稳定的单文件排队传输 (Sequential Execution)
                for (let i = 0; i < uploadTasks.length; i++) {
                    // 执行单个文件上传
                    await uploadTasks[i]();
                    // 强制休息 250 毫秒，确保 GitHub 服务器的 Git Tree 完全刷新，彻底杜绝 409
                    await delay(250); 
                    
                    progressLog.innerHTML = `<div class="loading-ring"></div> <span class="text-teal-300 font-bold mt-0.5">稳定推空中: ${i + 1} / ${uploadTasks.length} 进度...</span>`;
                }
                
                progressLog.innerHTML = `<i class="ph ph-check-circle-fill text-teal-400 text-lg flex-shrink-0"></i> <span class="text-teal-400 mt-0.5">所有 ${uploadTasks.length} 个文件已成功无损推送！</span>`;

                addLog("正在激活 GitHub Pages 静态传送通道...");
                try {
                    await ghFetch(`/repos/${user.login}/${repo}/pages`, token, 'POST', { source: { branch: 'main', path: '/' } });
                } catch (e) {
                    if (e.status !== 409) throw e;
                    addLog("Pages 通道已处于激活状态...", 'loading');
                }

                const finalUrl = `https://${user.login}.github.io/${repo}/`;
                addLog("全局链路构建完成！", 'done');
                
                const successBox = document.getElementById('success-link');
                successBox.classList.remove('hidden');
                setTimeout(() => successBox.classList.remove('translate-y-2', 'opacity-0'), 100);
                
                document.getElementById('final-url').innerText = finalUrl;
                document.getElementById('final-url').href = finalUrl;

            } catch (e) {
                addLog("部署协议发生异常: " + e.message, 'error');
                console.error(e);
            } finally {
                btnDeploy.disabled = false;
                btnDeploy.innerHTML = '<i class="ph ph-rocket-launch text-xl group-hover:animate-pulse"></i> 单线全自动部署';
                btnDeploy.classList.remove('opacity-50');
            }
        };
    </script>
</body>
</html>
